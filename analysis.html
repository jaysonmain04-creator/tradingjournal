<!DOCTYPE html>
<html>
<head>
  <title>Trade Analysis</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial;
      background-color: #401d23;
      color: white;
      text-align: center;
    }

    nav {
      background: #2b0f14;
      padding: 12px 0;
      margin-bottom: 10px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 20px;
      font-weight: bold;
    }

    h1 {
      margin-top: 30px;
      font-size: 40px;
    }

    /* ── Stats cards ── */
    .stats-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      padding: 20px 16px 0;
      max-width: 900px;
      margin: 0 auto;
    }

    .stat-card {
      background: #5a2a31;
      border-radius: 10px;
      padding: 16px 24px;
      min-width: 130px;
      flex: 1;
      box-shadow: 0 0 12px rgba(0,0,0,0.5);
    }

    .stat-label {
      font-size: 11px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: bold;
    }

    /* ── Patterns section ── */
    .section {
      max-width: 700px;
      margin: 24px auto 0;
      padding: 0 16px;
      text-align: left;
    }

    .section-title {
      font-size: 13px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
      text-align: center;
    }

    .insight {
      background: #5a2a31;
      border-left: 3px solid #8b3a44;
      border-radius: 6px;
      padding: 11px 14px;
      margin: 8px 0;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── Bar chart ── */
    .bar-group { margin: 10px 0; }

    .bar-label {
      font-size: 13px;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
    }

    .bar-track {
      background: #2b0f14;
      border-radius: 4px;
      height: 16px;
      width: 100%;
      overflow: hidden;
    }

    .bar-fill { height: 100%; border-radius: 4px; }
    .bar-fill.win  { background: #4caf50; }
    .bar-fill.loss { background: #e53935; }
    .bar-fill.be   { background: #42a5f5; }

    /* ── Trade list ── */
    .trade-list {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      max-width: 1400px;
      margin: 0 auto;
      padding: 10px 16px 40px;
    }

    .trade-list > p {
      grid-column: 1 / -1;
      text-align: center;
    }

    @media (max-width: 1100px) { .trade-list { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 760px)  { .trade-list { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px)  { .trade-list { grid-template-columns: 1fr; } }

    .trade {
      background: #2b0f14;
      margin: 0;
      padding: 12px 16px;
      border-radius: 8px;
      position: relative;
      text-align: left;
      line-height: 1.5;
      height: 200px;
      overflow: hidden;
      cursor: pointer;
      transition: background 0.15s;
    }

    .trade:hover { background: #351319; }

    .trade::after {
      content: "";
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 56px;
      background: linear-gradient(transparent, #2b0f14);
      pointer-events: none;
      transition: background 0.15s;
    }

    .trade:hover::after { background: linear-gradient(transparent, #351319); }

    /* ── Trade detail panel ── */
    #detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
    }
    #detail-overlay.open { display: block; }

    #detail-panel {
      position: fixed;
      top: 0;
      right: -560px;
      width: 540px;
      height: 100%;
      background: #1e0d10;
      z-index: 1001;
      display: flex;
      flex-direction: column;
      transition: right 0.28s cubic-bezier(0.4,0,0.2,1);
      box-shadow: -4px 0 24px rgba(0,0,0,0.6);
    }
    #detail-panel.open { right: 0; }

    .detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      border-bottom: 1px solid #3a1018;
      flex-shrink: 0;
    }
    .detail-header-left { text-align: left; }
    .detail-title { font-size: 18px; font-weight: bold; color: white; }
    .detail-subtitle { font-size: 12px; color: #888; margin-top: 2px; }
    .detail-close {
      background: #3a1018;
      color: #aaa;
      border: none;
      border-radius: 6px;
      padding: 7px 14px;
      font-size: 18px;
      cursor: pointer;
      width: auto;
      margin: 0;
      line-height: 1;
    }
    .detail-close:hover { background: #5a2a31; color: white; }

    .detail-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px 30px;
    }
    .detail-body::-webkit-scrollbar { width: 5px; }
    .detail-body::-webkit-scrollbar-track { background: transparent; }
    .detail-body::-webkit-scrollbar-thumb { background: #3a1018; border-radius: 3px; }

    .detail-row {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .detail-stat {
      background: #2b0f14;
      border-radius: 7px;
      padding: 10px 16px;
      flex: 1;
      min-width: 80px;
      text-align: left;
    }
    .detail-stat-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .detail-stat-value { font-size: 18px; font-weight: bold; }

    .detail-section-title {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 18px 0 8px;
    }

    .detail-notes {
      background: #2b0f14;
      border-radius: 7px;
      padding: 14px 16px;
      line-height: 1.6;
    }

    .detail-img {
      width: 100%;
      border-radius: 7px;
      margin-top: 14px;
      display: block;
      cursor: pointer;
    }

    @media (max-width: 560px) { #detail-panel { width: 100%; right: -100%; } }

    .journal-tabs {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 16px auto 12px;
    }

    .jtab {
      padding: 6px 18px;
      border-radius: 20px;
      border: none;
      font-size: 13px;
      font-weight: bold;
      background: #2b0f14;
      color: #aaa;
      cursor: pointer;
      width: auto;
      margin: 0;
    }

    .jtab:hover { background: #3a1018; color: #ccc; }
    .jtab.active { background: #5a2a31; color: white; }

    .pattern-split {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 760px;
      margin: 0 auto;
      padding: 0 16px;
    }

    .pattern-col {
      flex: 1;
      min-width: 260px;
      text-align: left;
    }

    .pattern-col-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: bold;
      margin-bottom: 8px;
      text-align: center;
    }

    .trade.win-trade  { border-left: 3px solid #4caf50; }
    .trade.loss-trade { border-left: 3px solid #e53935; }
    .trade.be-trade   { border-left: 3px solid #42a5f5; }

    .trade img {
      width: 100%;
      border-radius: 5px;
      margin-top: 8px;
      display: block;
      cursor: pointer;
    }

    .trade-date {
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
    }

    .win-text  { color: #4caf50; font-weight: bold; }
    .loss-text { color: #e53935; font-weight: bold; }
    .be-text   { color: #42a5f5; font-weight: bold; }

    .divider {
      border: none;
      border-top: 1px solid #5a2a31;
      margin: 28px auto;
      max-width: 500px;
    }

    .empty {
      color: #aaa;
      margin-top: 60px;
      font-size: 16px;
    }

    /* ── Word cloud ── */
    .word-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      padding: 10px 0;
    }

    .word-tag {
      border-radius: 20px;
      padding: 4px 12px;
      font-weight: bold;
      cursor: default;
      transition: opacity 0.2s;
    }

    .word-tag:hover { opacity: 0.8; }

    .word-cols {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .word-col {
      flex: 1;
      min-width: 200px;
      background: #5a2a31;
      border-radius: 10px;
      padding: 16px;
    }

    .word-col-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      font-weight: bold;
    }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 999;
      justify-content: center;
      align-items: center;
    }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
    #lightbox-close {
      position: fixed; top: 16px; right: 20px;
      font-size: 28px; cursor: pointer; color: white;
      font-weight: bold; background: none; border: none;
    }

  </style>
</head>
<body>

<nav>
  <a href="index.html" style="opacity:0.4;">Journal</a>
  <a href="analysis.html">Analysis</a>
</nav>

<h1>Analysis</h1>

<div id="content"></div>

<!-- Trade detail panel -->
<div id="detail-overlay" onclick="closeDetailPanel()"></div>
<div id="detail-panel">
  <div class="detail-header">
    <div class="detail-header-left">
      <div class="detail-title" id="detail-title">—</div>
      <div class="detail-subtitle" id="detail-subtitle">—</div>
    </div>
    <button class="detail-close" onclick="closeDetailPanel()">✕</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="chart">
</div>

<script>
const trades = JSON.parse(localStorage.getItem("trades")) || [];
const content = document.getElementById("content");

document.getElementById("lightbox").addEventListener("click", function(e) {
  if (e.target === this) closeLightbox();
});

function closeLightbox() {
  document.getElementById("lightbox").classList.remove("open");
}

function openLightbox(src) {
  document.getElementById("lightbox-img").src = src;
  document.getElementById("lightbox").classList.add("open");
}

if (trades.length === 0) {
  content.innerHTML = `<p class="empty">No trades logged yet. Add some in the Journal first.</p>`;
} else {
  const wins   = trades.filter(t => t.result === "Win");
  const losses = trades.filter(t => t.result === "Loss");
  const bes    = trades.filter(t => t.result === "BE");
  const total  = trades.length;
  const winRate = ((wins.length / total) * 100).toFixed(0);

  // ── RR parsing ──
  function parseRR(rr) {
    if (!rr) return null;
    const c = rr.match(/(\d+\.?\d*)\s*:\s*(\d+\.?\d*)/);
    if (c) return parseFloat(c[2]) / parseFloat(c[1]);
    const n = parseFloat(rr);
    return isNaN(n) ? null : n;
  }
  function avgRR(set) {
    const v = set.map(t => parseRR(t.rr)).filter(x => x !== null);
    return v.length ? (v.reduce((a,b)=>a+b,0)/v.length).toFixed(2) : null;
  }

  // ── Per-pair stats ──
  const pairs = [...new Set(trades.map(t => t.pair))];
  const pairStats = pairs.map(p => {
    const pt = trades.filter(t => t.pair === p);
    return {
      pair: p, total: pt.length,
      wins:   pt.filter(t => t.result === "Win").length,
      losses: pt.filter(t => t.result === "Loss").length,
      bes:    pt.filter(t => t.result === "BE").length
    };
  }).sort((a,b) => b.total - a.total);

  // ── PATTERN ENGINE ──
  const insights = [];

  // Trading-relevant terms to look for in notes
  const TRADING_TERMS = new Set([
    // Psychology / discipline
    "fomo","revenge","scared","fear","greed","patient","patience","discipline","disciplined",
    "emotional","hesitated","hesitation","hesitating","confident","confidence","impulsive",
    "rushed","bored","tired","frustrated","anxious","anxiety","calm","focused","distracted",
    "overconfident","reckless","random","forced","doubt","doubted","second-guessed",
    // Entry / exit
    "entry","exit","entered","exited","target","stop","stoploss","fill","filled","missed",
    "late","early","chased","chasing","oversize","oversized","size","position","risk",
    "reward","rr","ratio","drawdown","profit","loss",
    // Direction / bias
    "long","short","bullish","bearish","bias","direction","reversal","continuation",
    // Price action
    "breakout","breakdown","bounce","rejection","rejected","momentum","pullback","retest",
    "retested","consolidation","ranging","range","trend","trending","support","resistance",
    "level","zone","structure","candle","wick","body","setup","signal","confluence",
    "pattern","highs","lows","high","low",
    // Market conditions
    "news","choppy","chop","volatile","volatility","liquidity","spread","session","volume",
    "gap","slow","fast","trap","trapped","fake","fakeout",
    // iFVG / DodgysDD strategy terms
    "ifvg","bsl","ssl","dol","reversal","continuation","equilibrium","inversion","inverted",
    "eqh","eql","reqh","reql","ith","itl","lrlr","htf","ltf","bpr","displacement",
    "buyside","sellside","drawon","internal","external","sweep","swept","delivery",
    // Order flow / SMC terms
    "imbalance","rebalance","mitigation","mitigated","orderblock","liquidity",
    "inducement","bos","choch","mss","fvg","poi","premium","discount",
    // Actions
    "held","ran","stopped","triggered","reversed","continued","tapped","broke","broken",
    "pushed","dumped","squeezed","spiked","wicked"
  ]);

  // Generic English words to always ignore (even if repeated)
  const STOP = new Set([
    "the","and","to","it","in","of","my","was","on","at","had","but","is","so","for",
    "with","not","this","that","then","just","got","out","up","be","did","no","too",
    "into","from","after","also","an","as","are","have","its","me","we","they","all",
    "or","if","by","i","a","you","he","she","we","our","your","his","her","their",
    "want","wanted","like","liked","how","far","kept","keep","came","come","went","go",
    "take","took","make","made","said","say","know","knew","think","thought","see","saw",
    "felt","feel","would","could","should","will","can","may","might","must","need",
    "been","being","get","very","really","quite","still","again","even","already","almost",
    "always","never","often","sometimes","finally","actually","basically","however",
    "therefore","pretty","about","around","before","during","through","between","over",
    "under","back","right","left","other","more","less","much","many","few","some","any",
    "every","each","both","time","day","week","month","year","thing","way","part","here",
    "there","where","when","why","what","which","who","same","different","new","old",
    "big","good","bad","well","now","then","set","end","put","try","tried","used","use",
    "move","moved","look","looked","let","its","these","those","than","only","such",
    "own","while","where","because","since","unless","until","although","whether",
    "nor","yet","either","neither","once","further","down","off","next","last","first",
    "second","third","price","prices","higher","lower","little","didnt","wasnt","couldnt",
    "shouldnt","wouldnt","expanded","instead","thought","thinking","going","doing",
    "something","anything","nothing","everything","another","without","within","across"
  ]);

  function tokenize(text) {
    return text.toLowerCase()
      .replace(/[^a-z\s]/g, " ")
      .split(/\s+/)
      .filter(w => w.length > 2 && !STOP.has(w));
  }

  // Count each word once per trade (presence, not raw frequency)
  function wordPresence(tradeSet) {
    const presence = {};
    tradeSet.forEach(t => {
      const words = new Set(tokenize(t.notes || ""));
      words.forEach(w => { presence[w] = (presence[w]||0)+1; });
    });
    return presence;
  }

  // Words significantly more common in one group vs the other
  // minBias: minimum percentage-point gap to show a word (default 20pp)
  function biasedWords(srcPresence, othPresence, srcN, othN, minBias = 20) {
    if (srcN === 0) return [];
    return Object.entries(srcPresence)
      .filter(([w, cnt]) => {
        if (cnt < 2) return false;
        if (!TRADING_TERMS.has(w) && cnt < 3) return false;
        const srcPct = (cnt / srcN) * 100;
        const othPct = ((othPresence[w]||0) / (othN || 1)) * 100;
        return srcPct - othPct >= minBias;
      })
      .map(([w, cnt]) => ({
        word: w,
        srcCount: cnt,
        srcPct: Math.round((cnt / srcN) * 100),
        othPct: Math.round(((othPresence[w]||0) / (othN || 1)) * 100),
        bias: Math.round((cnt / srcN) * 100 - ((othPresence[w]||0) / (othN || 1)) * 100)
      }))
      .sort((a, b) => b.bias - a.bias)
      .slice(0, 8);
  }

  // 1. Pair loss rate
  const worstPair = [...pairStats].sort((a,b) => b.losses - a.losses)[0];
  if (worstPair?.losses > 0) {
    const r = ((worstPair.losses / worstPair.total)*100).toFixed(0);
    if (r >= 50) insights.push({ level:"warning", text: `You lose <strong>${r}%</strong> of your <strong>${worstPair.pair}</strong> trades (${worstPair.losses}/${worstPair.total}). Consider cutting your size or skipping this instrument until you identify what's going wrong.` });
    else insights.push({ level:"info", text: `<strong>${worstPair.pair}</strong> has your most losses at <strong>${r}%</strong> loss rate (${worstPair.losses}/${worstPair.total}).` });
  }

  // 2. Best pair
  const bestPair = [...pairStats].sort((a,b) => (b.wins/b.total)-(a.wins/a.total))[0];
  if (bestPair?.wins > 0) {
    const r = ((bestPair.wins / bestPair.total)*100).toFixed(0);
    insights.push({ level:"good", text: `<strong>${bestPair.pair}</strong> is your best pair — <strong>${r}%</strong> win rate. Stick to setups that have worked here.` });
  }

  // 3. RR analysis
  const avgW = avgRR(wins), avgL = avgRR(losses);
  if (avgW && avgL) {
    const ratio = (parseFloat(avgW) / parseFloat(avgL)).toFixed(2);
    const msg = `Average RR on wins: <strong>${avgW}R</strong> &nbsp;|&nbsp; on losses: <strong>${avgL}R</strong>.`;
    if (parseFloat(avgL) > parseFloat(avgW)) insights.push({ level:"warning", text: msg + ` You're letting losers run bigger than your winners — this kills your account even with a decent win rate.` });
    else insights.push({ level:"info", text: msg + ` Your winners are bigger than your losers — good.` });
  }

  // 4. Losing streak
  let maxStreak = 0, curStreak = 0, currentStreak = 0;
  trades.forEach(t => {
    if (t.result === "Loss") { curStreak++; maxStreak = Math.max(maxStreak, curStreak); }
    else curStreak = 0;
  });
  // current streak at end
  for (let i = trades.length-1; i >= 0; i--) {
    if (trades[i].result === "Loss") currentStreak++;
    else break;
  }
  if (currentStreak >= 2) insights.push({ level:"warning", text: `You're currently on a <strong>${currentStreak}-loss streak</strong>. Step back and review before your next trade.` });
  else if (maxStreak >= 3) insights.push({ level:"info", text: `Your longest losing streak was <strong>${maxStreak} in a row</strong>. Make sure you have a rule for when to stop trading for the day.` });

  // 5. Revenge trading — loss immediately followed by another loss on same pair
  let revengeCnt = 0;
  for (let i = 1; i < trades.length; i++) {
    if (trades[i-1].result === "Loss" && trades[i].result === "Loss" && trades[i-1].pair === trades[i].pair) revengeCnt++;
  }
  if (revengeCnt >= 2) insights.push({ level:"warning", text: `Possible <strong>revenge trading</strong> detected — you've taken back-to-back losses on the same pair <strong>${revengeCnt} times</strong>. After a loss, pause before re-entering.` });

  // 6. Word presence analysis — per-trade, not per-mention
  const lossPresence = wordPresence(losses);
  const winPresence  = wordPresence(wins);
  const lossWords    = biasedWords(lossPresence, winPresence, losses.length, wins.length);
  const winWords     = biasedWords(winPresence,  lossPresence, wins.length, losses.length);

  // Surface top loss-biased words as a pattern insight
  if (lossWords.length >= 2) {
    const top = lossWords.slice(0, 5).map(w => `<strong>${w.word}</strong>`).join(", ");
    insights.push({ level:"warning", text: `Red-flag thoughts in your losses: ${top}. If any of these come up before entry, sit on your hands.` });
  }

  // 7. Win-biased words
  if (winWords.length >= 2) {
    const top = winWords.slice(0, 4).map(w => `<strong>${w.word}</strong>`).join(", ");
    insights.push({ level:"good", text: `Winning mindset words: ${top}. When you're thinking like this, your trades tend to work.` });
  }

  // Keep lossFreq/winFreq aliases for legacy HTML section below
  const lossFreq = lossPresence;
  const winFreq  = winPresence;

  // 8. Win rate trend (first half vs second half)
  if (total >= 6) {
    const half = Math.floor(total/2);
    const early = trades.slice(0, half);
    const recent = trades.slice(half);
    const earlyWR = (early.filter(t=>t.result==="Win").length / half * 100).toFixed(0);
    const recentWR = (recent.filter(t=>t.result==="Win").length / recent.length * 100).toFixed(0);
    const diff = parseInt(recentWR) - parseInt(earlyWR);
    if (diff <= -20) insights.push({ level:"warning", text: `Your win rate has <strong>dropped ${Math.abs(diff)}%</strong> recently (${earlyWR}% early → ${recentWR}% recent). Something has changed in your execution or market conditions.` });
    else if (diff >= 20) insights.push({ level:"good", text: `Your win rate has <strong>improved ${diff}%</strong> recently (${earlyWR}% early → ${recentWR}% recent). You're getting better — keep going.` });
  }

  // 9. Overtrading check
  if (total >= 10 && (losses.length / total) > 0.6) {
    insights.push({ level:"warning", text: `With a <strong>${winRate}% win rate</strong> across ${total} trades, you may be overtrading or entering low-quality setups. Quality over quantity.` });
  }

  // 10. Confidence analysis
  const confTrades = trades.filter(t => t.confidence);
  if (confTrades.length >= 3) {
    const confWins   = wins.filter(t => t.confidence);
    const confLosses = losses.filter(t => t.confidence);
    const avgConfWin  = confWins.length   ? (confWins.reduce((a,t)=>a+t.confidence,0)/confWins.length).toFixed(1)   : null;
    const avgConfLoss = confLosses.length ? (confLosses.reduce((a,t)=>a+t.confidence,0)/confLosses.length).toFixed(1) : null;
    if (avgConfWin && avgConfLoss) {
      if (parseFloat(avgConfLoss) <= 5 && parseFloat(avgConfWin) > parseFloat(avgConfLoss)) {
        insights.push({ level:"warning", text: `Avg confidence on <strong>losses: ${avgConfLoss}/10</strong> vs <strong>wins: ${avgConfWin}/10</strong>. You're entering your worst trades with low conviction — if confidence isn't there, skip it.` });
      } else {
        insights.push({ level:"info", text: `Avg confidence — wins: <strong>${avgConfWin}/10</strong> | losses: <strong>${avgConfLoss}/10</strong>.` });
      }
    }
    const lowConfLosses = losses.filter(t => t.confidence && t.confidence <= 4).length;
    if (lowConfLosses >= 2) {
      insights.push({ level:"warning", text: `<strong>${lowConfLosses} losses</strong> were entered with confidence ≤ 4/10. Low conviction is costing you — use confidence as a hard filter.` });
    }
    const highConfWinCount = wins.filter(t => t.confidence && t.confidence >= 8).length;
    if (highConfWinCount >= 2) {
      insights.push({ level:"good", text: `<strong>${highConfWinCount} wins</strong> were taken at confidence 8+/10. Your highest conviction trades perform best — lean into them.` });
    }
  }

  // 11. Setup grade analysis
  const gradedTrades = trades.filter(t => t.grade);
  if (gradedTrades.length >= 3) {
    // Win rate per grade tier
    const aPlusTrades = gradedTrades.filter(t => t.grade === "A+" || t.grade === "A");
    const aMinus      = gradedTrades.filter(t => t.grade === "A-" || t.grade === "B+");
    const bOrLower    = gradedTrades.filter(t => ["B","B-","C"].includes(t.grade));

    if (aPlusTrades.length >= 2) {
      const wr = ((aPlusTrades.filter(t=>t.result==="Win").length / aPlusTrades.length)*100).toFixed(0);
      insights.push({ level:"good", text: `Your <strong>A/A+ setups</strong> win <strong>${wr}%</strong> of the time (${aPlusTrades.length} trades). These are your bread-and-butter — only trade these when you can.` });
    }
    if (bOrLower.length >= 2) {
      const wr = ((bOrLower.filter(t=>t.result==="Win").length / bOrLower.length)*100).toFixed(0);
      const losses = bOrLower.filter(t=>t.result==="Loss").length;
      if (losses >= 1) insights.push({ level:"warning", text: `You've taken <strong>${bOrLower.length} B/C grade setups</strong> and only won <strong>${wr}%</strong>. These are low-quality entries — cut them entirely or size way down.` });
    }

    // Most common losing grade
    const gradeLosses = {};
    losses.filter(t=>t.grade).forEach(t => { gradeLosses[t.grade] = (gradeLosses[t.grade]||0)+1; });
    const worstGrade = Object.entries(gradeLosses).sort((a,b)=>b[1]-a[1])[0];
    if (worstGrade && worstGrade[1] >= 2) {
      insights.push({ level:"warning", text: `Your most common losing setup grade is <strong>${worstGrade[0]}</strong> (${worstGrade[1]} losses). You keep entering at this quality level and losing — raise your minimum.` });
    }
  }

  // 12. Reversal vs Continuation model win rate
  const reversals     = trades.filter(t => t.tradeType === "Reversal");
  const continuations = trades.filter(t => t.tradeType === "Continuation");
  if (reversals.length >= 3 && continuations.length >= 3) {
    const revWR  = ((reversals.filter(t=>t.result==="Win").length/reversals.length)*100).toFixed(0);
    const contWR = ((continuations.filter(t=>t.result==="Win").length/continuations.length)*100).toFixed(0);
    const diff   = Math.abs(parseInt(revWR) - parseInt(contWR));
    if (diff >= 15) {
      const better   = parseInt(revWR) > parseInt(contWR) ? "Reversal" : "Continuation";
      const betterWR = Math.max(parseInt(revWR), parseInt(contWR));
      const worse    = better === "Reversal" ? "Continuation" : "Reversal";
      const worseWR  = Math.min(parseInt(revWR), parseInt(contWR));
      insights.push({ level:"info", text: `<strong>${better} model</strong> wins <strong>${betterWR}%</strong> vs ${worse} at <strong>${worseWR}%</strong>. You execute better in one model — figure out why and lean into it.` });
    } else {
      insights.push({ level:"info", text: `Reversal: <strong>${revWR}%</strong> win rate (${reversals.length} trades) | Continuation: <strong>${contWR}%</strong> (${continuations.length} trades).` });
    }
  } else if (reversals.length + continuations.length >= 2) {
    insights.push({ level:"info", text: `Tag all trades as Reversal or Continuation — once you have enough, patterns between models will surface here.` });
  }

  // 13. No-sweep losses (rule #1 violation)
  const noSweepLosses = losses.filter(t => t.checklist && !t.checklist.sweep);
  if (noSweepLosses.length >= 2) {
    insights.push({ level:"warning", text: `<strong>${noSweepLosses.length} losses</strong> were taken <strong>without a BSL/SSL sweep</strong>. Rule #1 is non-negotiable — no sweep, no trade. These are your most avoidable losses.` });
  }

  // 14. Invalid entry losses (sweep present but valid entry not checked)
  const invalidEntryLosses = losses.filter(t => t.checklist && t.checklist.sweep && t.checklist.ifvg && !t.checklist.valid);
  if (invalidEntryLosses.length >= 2) {
    insights.push({ level:"warning", text: `<strong>${invalidEntryLosses.length} losses</strong> where you had the sweep and IFVG but <strong>entry was invalid</strong> (internal high/low already taken). Wait for inversion before the next internal level.` });
  }

  // ── HTML ──
  function pct(n) { return total > 0 ? Math.round((n/total)*100) : 0; }

  function barRow(label, count, cls) {
    const w = pct(count);
    return `<div class="bar-group">
      <div class="bar-label"><span>${label}</span><span>${count} (${w}%)</span></div>
      <div class="bar-track"><div class="bar-fill ${cls}" style="width:${w}%"></div></div>
    </div>`;
  }

  const pairBars = pairStats.map(p => `
    <div class="bar-group">
      <div class="bar-label"><span>${p.pair}</span><span>${p.total} trades — W:${p.wins} L:${p.losses} BE:${p.bes}</span></div>
      <div style="display:flex;gap:3px;height:16px;">
        <div class="bar-track" style="flex:${p.wins||0.01}"><div class="bar-fill win" style="width:100%"></div></div>
        <div class="bar-track" style="flex:${p.losses||0.01}"><div class="bar-fill loss" style="width:100%"></div></div>
        <div class="bar-track" style="flex:${p.bes||0.01}"><div class="bar-fill be" style="width:100%"></div></div>
      </div>
    </div>`).join("");

  // ── Pre-compute grade & model bars ──
  const GRADE_COLORS = { "A+":"#4caf50","A":"#66bb6a","A-":"#8bc34a","B+":"#ffa726","B":"#ff7043","B-":"#e53935","C":"#b71c1c" };
  const gradeOrder = ["A+","A","A-","B+","B","B-","C"];

  // gradedTrades already declared above (insight #11)
  const gradeBars = gradedTrades.length >= 2 ? gradeOrder.map(g => {
    const gt = gradedTrades.filter(t => t.grade === g);
    if (gt.length === 0) return "";
    const gWins = gt.filter(t => t.result === "Win").length;
    const gLoss = gt.filter(t => t.result === "Loss").length;
    const gWR   = ((gWins / gt.length) * 100).toFixed(0);
    const col   = GRADE_COLORS[g] || "#888";
    return `<div class="bar-group">
      <div class="bar-label"><span style="color:${col};font-weight:bold;">${g}</span><span>${gt.length} trade${gt.length>1?"s":""} &nbsp;·&nbsp; W:${gWins} L:${gLoss} &nbsp;·&nbsp; <strong>${gWR}% WR</strong></span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${gWR}%;background:${col};"></div></div>
    </div>`;
  }).join("") : "";

  const modelBars = (reversals.length + continuations.length >= 2) ? [
    { label:"Reversal",     set: reversals,     color:"#42a5f5" },
    { label:"Continuation", set: continuations, color:"#ab47bc" }
  ].filter(x => x.set.length > 0).map(({ label, set, color }) => {
    const w  = set.filter(t => t.result === "Win").length;
    const wr = ((w / set.length) * 100).toFixed(0);
    return `<div class="bar-group">
      <div class="bar-label"><span style="font-weight:bold;">${label}</span><span>${set.length} trades &nbsp;·&nbsp; ${w} wins &nbsp;·&nbsp; <strong>${wr}% WR</strong></span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${wr}%;background:${color};"></div></div>
    </div>`;
  }).join("") : "";

  // A/A+ rate stat
  const aPlusCount  = gradedTrades.filter(t => t.grade === "A+" || t.grade === "A").length;
  const aPlusRate   = gradedTrades.length ? Math.round((aPlusCount / gradedTrades.length) * 100) : null;

  // Quality Score: checklist (0-6 pts) + confidence (0-4 pts) = 0-10
  function qualityScore(t) {
    let score = 0, hasSomething = false;
    if (t.checklist) {
      const keys = ["sweep","ifvg","valid","target","pd","momentum"];
      score += (keys.filter(k => t.checklist[k]).length / 6) * 6;
      hasSomething = true;
    }
    if (t.confidence) { score += (t.confidence / 10) * 4; hasSomething = true; }
    return hasSomething ? Math.round(score) : null;
  }
  function qsColor(qs) { return qs >= 8 ? "#4caf50" : qs >= 5 ? "#ffa726" : "#e53935"; }

  const scoredTrades = trades.map(t => ({ ...t, qs: qualityScore(t) })).filter(t => t.qs !== null);
  const avgQS = scoredTrades.length
    ? (scoredTrades.reduce((a, t) => a + t.qs, 0) / scoredTrades.length).toFixed(1)
    : null;
  const avgQSWin  = scoredTrades.filter(t => t.result === "Win").length
    ? (scoredTrades.filter(t => t.result === "Win").reduce((a,t)=>a+t.qs,0) / scoredTrades.filter(t=>t.result==="Win").length).toFixed(1)
    : null;
  const avgQSLoss = scoredTrades.filter(t => t.result === "Loss").length
    ? (scoredTrades.filter(t => t.result === "Loss").reduce((a,t)=>a+t.qs,0) / scoredTrades.filter(t=>t.result==="Loss").length).toFixed(1)
    : null;

  // ── Rule Correlation + Loss DNA ──
  const dnaKeys   = ["sweep","ifvg","valid","target","pd","momentum"];
  const dnaLabels = ["BSL/SSL Swept","IFVG Identified","Valid Entry","Clear DOL","Correct P/D","No Chop"];
  const tradesWithCL = trades.filter(t => t.checklist);
  const lossesWithCL = losses.filter(t => t.checklist);

  // Per-rule: how often broken, WR with vs without
  const ruleStats = dnaKeys.map((k, i) => {
    const present = tradesWithCL.filter(t =>  t.checklist[k]);
    const absent  = tradesWithCL.filter(t => !t.checklist[k]);
    const pWR = present.length ? Math.round(present.filter(t=>t.result==="Win").length/present.length*100) : null;
    const aWR = absent.length  ? Math.round(absent.filter(t=>t.result==="Win").length/absent.length*100)   : null;
    return { label: dnaLabels[i], key: k, broken: absent.length,
      brokenPct: tradesWithCL.length ? Math.round(absent.length/tradesWithCL.length*100) : 0,
      presentWR: pWR, absentWR: aWR, impact: (pWR !== null && aWR !== null) ? pWR - aWR : null };
  });

  // Loss fingerprints: grade + conf band + missing checklist items
  const fpMap = {};
  losses.forEach(t => {
    const g  = t.grade || "–";
    const cb = !t.confidence ? "no conf" : t.confidence<=4 ? "≤4" : t.confidence<=6 ? "5-6" : "7+";
    const ms = t.checklist ? dnaKeys.filter(k=>!t.checklist[k]).map((_,i)=>dnaLabels[dnaKeys.indexOf(dnaKeys[i])]) : [];
    const fp = g+"|"+cb+"|"+ms.join(",");
    if (!fpMap[fp]) fpMap[fp] = { grade:g, confBand:cb, missing:ms, count:0 };
    fpMap[fp].count++;
  });
  const topLossProfiles = Object.values(fpMap).sort((a,b)=>b.count-a.count).slice(0,5);

  // Highest probability setup: grade + model combo with best WR (min 2 trades)
  const setupMap = {};
  trades.forEach(t => {
    if (!t.grade) return;
    const key = t.grade + (t.model ? "|"+t.model : "");
    if (!setupMap[key]) setupMap[key] = { grade: t.grade, model: t.model||"", wins:0, total:0 };
    setupMap[key].total++;
    if (t.result === "Win") setupMap[key].wins++;
  });
  const bestSetup = Object.values(setupMap)
    .filter(s => s.total >= 2)
    .map(s => ({ ...s, wr: Math.round(s.wins/s.total*100) }))
    .sort((a,b) => b.wr - a.wr || b.total - a.total)[0] || null;

  // Biggest mistake patterns (quantified)
  const mistakePatterns = [];
  if (losses.length > 0) {
    const noSweepL    = losses.filter(t => t.checklist && !t.checklist.sweep);
    const noIfvgL     = losses.filter(t => t.checklist && t.checklist.sweep && !t.checklist.ifvg);
    const noValidL    = losses.filter(t => t.checklist && !t.checklist.valid);
    const lowConfL    = losses.filter(t => t.confidence && t.confidence <= 4);
    const lowGradeL   = losses.filter(t => t.grade && ["B","B-","C"].includes(t.grade));
    const forcedL     = losses.filter(t => /forced|shouldnt|shouldn't|didnt want|didn't want|shouldn't/i.test(t.notes||""));
    const emotionalL  = losses.filter(t => /emotional|emotion|chasing|revenge|frustrated|angry|upset/i.test(t.notes||""));
    const newsL       = losses.filter(t => /fomc|news|trump|fed|report/i.test(t.notes||""));
    if (noSweepL.length)    mistakePatterns.push({ label:"Entering without BSL/SSL sweep", count: noSweepL.length, pct: Math.round(noSweepL.length/losses.length*100), color:"#e53935" });
    if (noValidL.length)    mistakePatterns.push({ label:"Taking invalid entries (IFVG not inverted first)", count: noValidL.length, pct: Math.round(noValidL.length/losses.length*100), color:"#ff7043" });
    if (noIfvgL.length)     mistakePatterns.push({ label:"No IFVG identified before entry", count: noIfvgL.length, pct: Math.round(noIfvgL.length/losses.length*100), color:"#ffa726" });
    if (lowConfL.length)    mistakePatterns.push({ label:"Entering at low confidence (≤4/10)", count: lowConfL.length, pct: Math.round(lowConfL.length/losses.length*100), color:"#ffa726" });
    if (lowGradeL.length)   mistakePatterns.push({ label:"Taking B/C grade setups (below standard)", count: lowGradeL.length, pct: Math.round(lowGradeL.length/losses.length*100), color:"#ff7043" });
    if (forcedL.length)     mistakePatterns.push({ label:"Forcing trades (noted in journal)", count: forcedL.length, pct: Math.round(forcedL.length/losses.length*100), color:"#e53935" });
    if (emotionalL.length)  mistakePatterns.push({ label:"Trading emotionally / revenge trading", count: emotionalL.length, pct: Math.round(emotionalL.length/losses.length*100), color:"#e53935" });
    if (newsL.length)       mistakePatterns.push({ label:"Trading on high-impact news days", count: newsL.length, pct: Math.round(newsL.length/losses.length*100), color:"#ffa726" });
    mistakePatterns.sort((a,b) => b.count - a.count);
  }

  const lossDNAHTML = (function() {
    if (losses.length < 2 && tradesWithCL.length < 2) return "";
    const sortedRules = [...ruleStats].sort((a,b)=>b.brokenPct-a.brokenPct);
    const impactRules = [...ruleStats].filter(r=>r.impact!==null).sort((a,b)=>b.impact-a.impact);

    const ruleBreakBars = sortedRules.filter(r=>r.broken>0).map(r => {
      const impactSign = r.impact !== null ? (r.impact > 0 ? `<span style="color:#4caf50;font-size:11px;">+${r.impact}% WR when followed</span>` : `<span style="color:#888;font-size:11px;">${r.impact}% WR difference</span>`) : "";
      return `<div class="bar-group">
        <div class="bar-label">
          <span>${r.label}</span>
          <span>broken ${r.broken}x (${r.brokenPct}%) &nbsp;${impactSign}</span>
        </div>
        <div class="bar-track"><div class="bar-fill loss" style="width:${r.brokenPct}%;"></div></div>
      </div>`;
    }).join("");

    const wrCompareRows = impactRules.map(r => {
      const pwCol = r.presentWR >= 60 ? "#4caf50" : r.presentWR >= 40 ? "#ffa726" : "#e53935";
      const awCol = r.absentWR  >= 60 ? "#4caf50" : r.absentWR  >= 40 ? "#ffa726" : "#e53935";
      return `<tr>
        <td style="padding:5px 8px;color:#ccc;">${r.label}</td>
        <td style="padding:5px 8px;text-align:center;color:${pwCol};font-weight:bold;">${r.presentWR !== null ? r.presentWR+"%" : "–"}</td>
        <td style="padding:5px 8px;text-align:center;color:${awCol};">${r.absentWR  !== null ? r.absentWR+"%" : "–"}</td>
        <td style="padding:5px 8px;text-align:center;color:${r.impact>0?"#4caf50":r.impact<0?"#e53935":"#888"};">${r.impact !== null ? (r.impact>0?"+":"")+r.impact+"%" : "–"}</td>
      </tr>`;
    }).join("");

    const profileCards = topLossProfiles.map(p => {
      const missingStr = p.missing.length ? p.missing.join(", ") : "All rules followed";
      const col = p.missing.length === 0 ? "#ffa726" : "#e53935";
      return `<div style="background:#1a1a1a;border:1px solid ${col};border-radius:8px;padding:10px 14px;margin-bottom:8px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
          <span style="font-weight:bold;font-size:13px;">Grade ${p.grade} &nbsp;·&nbsp; Conf ${p.confBand}</span>
          <span style="background:${col};color:#fff;border-radius:4px;padding:2px 8px;font-size:12px;">${p.count}x</span>
        </div>
        <div style="font-size:12px;color:#aaa;">Missing: <span style="color:${col};">${missingStr}</span></div>
      </div>`;
    }).join("");

    const bestSetupHTML = bestSetup ? `
      <div style="background:#0d2a1a;border:1px solid #4caf50;border-radius:8px;padding:14px;margin-bottom:16px;">
        <div style="font-size:13px;color:#888;margin-bottom:6px;">Your highest probability setup (min 2 trades):</div>
        <div style="font-size:22px;font-weight:bold;color:#4caf50;">${bestSetup.grade}${bestSetup.model ? " · "+bestSetup.model : ""}</div>
        <div style="font-size:13px;color:#ccc;margin-top:4px;">${bestSetup.wins}W / ${bestSetup.total-bestSetup.wins}L across ${bestSetup.total} trades &nbsp;·&nbsp; <strong style="color:#4caf50;">${bestSetup.wr}% win rate</strong></div>
        <div style="font-size:12px;color:#888;margin-top:6px;">Stack the deck: only take trades that match this profile.</div>
      </div>` : "";

    const mistakeHTML = mistakePatterns.length ? mistakePatterns.map(m =>
      `<div class="bar-group">
        <div class="bar-label"><span style="color:${m.color};">${m.label}</span><span>${m.count} loss${m.count>1?"es":""} (${m.pct}% of all losses)</span></div>
        <div class="bar-track"><div class="bar-fill loss" style="width:${m.pct}%;background:${m.color};"></div></div>
      </div>`).join("") : `<div style="color:#888;font-size:13px;">Add more notes to your trades — mistake patterns will surface here.</div>`;

    return `
    <!-- Rule Analysis & Loss DNA -->
    <hr class="divider">
    <div class="section-title" style="margin-top:0;">Rule Analysis &amp; Loss DNA</div>

    ${bestSetupHTML}

    ${ruleBreakBars ? `<div class="section">
      <div class="section-title" style="margin-top:8px;font-size:13px;color:#e53935;">Rules Broken Most Often (in losses)</div>
      ${ruleBreakBars}
    </div>` : ""}

    ${wrCompareRows ? `<div class="section">
      <div class="section-title" style="margin-top:8px;font-size:13px;">Win Rate: Rule Followed vs Broken</div>
      <div style="overflow-x:auto;">
        <table style="width:100%;border-collapse:collapse;font-size:12px;">
          <thead><tr style="color:#888;border-bottom:1px solid #333;">
            <th style="text-align:left;padding:5px 8px;">Rule</th>
            <th style="padding:5px 8px;">WR (followed)</th>
            <th style="padding:5px 8px;">WR (broken)</th>
            <th style="padding:5px 8px;">Impact</th>
          </tr></thead>
          <tbody>${wrCompareRows}</tbody>
        </table>
      </div>
    </div>` : ""}

    ${mistakePatterns.length ? `<div class="section">
      <div class="section-title" style="margin-top:8px;font-size:13px;color:#ffa726;">Your Biggest Trading Mistakes</div>
      ${mistakeHTML}
    </div>` : ""}

    ${topLossProfiles.length ? `<div class="section">
      <div class="section-title" style="margin-top:8px;font-size:13px;color:#e53935;">Loss Fingerprints (most repeated losing profiles)</div>
      <div style="font-size:12px;color:#888;margin-bottom:10px;">These are your most repeated exact losing setups — grade, confidence, and missing rules.</div>
      ${profileCards}
    </div>` : ""}
    `;
  })();

  content.innerHTML = `
    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Trades</div>
        <div class="stat-value">${total}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Win Rate</div>
        <div class="stat-value" style="color:#4caf50;">${winRate}%</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Wins</div>
        <div class="stat-value" style="color:#4caf50;">${wins.length}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Losses</div>
        <div class="stat-value" style="color:#e53935;">${losses.length}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">BE</div>
        <div class="stat-value" style="color:#42a5f5;">${bes.length}</div>
      </div>
      ${aPlusRate !== null ? `<div class="stat-card">
        <div class="stat-label">A/A+ Rate</div>
        <div class="stat-value" style="color:#4caf50;">${aPlusRate}%</div>
      </div>` : ""}
      ${avgQS !== null ? `<div class="stat-card">
        <div class="stat-label">Avg Quality</div>
        <div class="stat-value" style="color:${qsColor(parseFloat(avgQS))};">${avgQS}<span style="font-size:13px;color:#888;">/10</span></div>
      </div>` : ""}
    </div>

    <!-- Overview bars -->
    <div class="section" style="margin-top:28px;">
      <div class="section-title">Overview</div>
      ${barRow("Wins", wins.length, "win")}
      ${barRow("Losses", losses.length, "loss")}
      ${barRow("Break Even", bes.length, "be")}
    </div>

    <!-- By pair -->
    <div class="section">
      <div class="section-title" style="margin-top:8px;">By Pair &nbsp;<span style="font-size:11px;color:#4caf50;">■</span> Win &nbsp;<span style="font-size:11px;color:#e53935;">■</span> Loss &nbsp;<span style="font-size:11px;color:#42a5f5;">■</span> BE</div>
      ${pairBars}
    </div>

    <!-- By setup grade -->
    ${gradeBars ? `<div class="section">
      <div class="section-title" style="margin-top:8px;">By Setup Grade</div>
      ${gradeBars}
    </div>` : ""}

    <!-- By trade model -->
    ${modelBars ? `<div class="section">
      <div class="section-title" style="margin-top:8px;">By Trade Model</div>
      ${modelBars}
    </div>` : ""}

    <!-- Quality score breakdown -->
    ${(avgQSWin !== null || avgQSLoss !== null) ? `<div class="section">
      <div class="section-title" style="margin-top:8px;">Quality Score Breakdown <span style="font-size:11px;color:#888;">(checklist 0–6 pts + confidence 0–4 pts)</span></div>
      ${avgQSWin  !== null ? `<div class="bar-group"><div class="bar-label"><span style="color:#4caf50;">Wins &nbsp;— avg QS</span><span style="color:#4caf50;font-weight:bold;">${avgQSWin}/10</span></div><div class="bar-track"><div class="bar-fill win" style="width:${parseFloat(avgQSWin)*10}%;"></div></div></div>` : ""}
      ${avgQSLoss !== null ? `<div class="bar-group"><div class="bar-label"><span style="color:#e53935;">Losses — avg QS</span><span style="color:#e53935;font-weight:bold;">${avgQSLoss}/10</span></div><div class="bar-track"><div class="bar-fill loss" style="width:${parseFloat(avgQSLoss)*10}%;"></div></div></div>` : ""}
      ${avgQS     !== null ? `<div style="font-size:12px;color:#888;margin-top:6px;">Overall avg: <strong style="color:${qsColor(parseFloat(avgQS))};">${avgQS}/10</strong> across ${scoredTrades.length} rated trades</div>` : ""}
    </div>` : ""}

    ${lossDNAHTML}

    <!-- Patterns -->
    ${insights.length ? `
    <div class="section">
      <div class="section-title" style="margin-top:8px;">Patterns Found</div>
      ${insights.map(i => {
        const border = i.level === "warning" ? "#e53935" : i.level === "good" ? "#4caf50" : "#8b3a44";
        const icon   = i.level === "warning" ? "⚠️" : i.level === "good" ? "✅" : "ℹ️";
        return `<div class="insight" style="border-left-color:${border};">${icon} ${i.text}</div>`;
      }).join("")}
    </div>` : ""}

    <!-- Journal thought analysis -->
    ${(lossWords.length > 0 || winWords.length > 0) ? (() => {
      function thoughtRow(w, barColor) {
        return `<div class="bar-group">
          <div class="bar-label">
            <span style="font-weight:bold;">${w.word}</span>
            <span style="font-size:11px;color:#aaa;">${w.srcCount} trade${w.srcCount>1?"s":""} (${w.srcPct}%) &nbsp;vs&nbsp; ${w.othPct}% other</span>
          </div>
          <div class="bar-track"><div class="bar-fill" style="width:${w.srcPct}%;background:${barColor};"></div></div>
        </div>`;
      }

      return `
      <div class="section" style="max-width:760px;">
        <div class="section-title" style="margin-top:8px;">Journal Thought Analysis <span style="font-size:10px;color:#666;">(% of trades containing each word — once per trade)</span></div>
        <div class="word-cols">
          ${lossWords.length ? `
          <div class="word-col">
            <div class="word-col-title" style="color:#e53935;">Red Flag Thoughts</div>
            <div style="font-size:11px;color:#888;margin-bottom:10px;">These appear significantly more in your losses. If you're writing like this, reconsider the trade.</div>
            ${lossWords.map(w => thoughtRow(w, "#e53935")).join("")}
          </div>` : ""}
          ${winWords.length ? `
          <div class="word-col">
            <div class="word-col-title" style="color:#4caf50;">Winning Thoughts</div>
            <div style="font-size:11px;color:#888;margin-bottom:10px;">These appear significantly more in your wins. Look for this mindset before entering.</div>
            ${winWords.map(w => thoughtRow(w, "#4caf50")).join("")}
          </div>` : ""}
        </div>
      </div>`;
    })() : ""}

    <hr class="divider">

    <!-- Split patterns: Losses vs Wins -->
    <div class="section-title" style="margin-top:0;">Patterns by Result</div>
    <div class="pattern-split">

      <!-- Loss patterns -->
      <div class="pattern-col">
        <div class="pattern-col-title" style="color:#e53935;">Loss Patterns</div>
        ${(() => {
          const lossInsights = [];
          if (losses.length === 0) return `<div class="insight" style="border-left-color:#555;color:#aaa;">No losses logged yet.</div>`;

          // Forced trade detection
          const forcedLosses = losses.filter(t => /forced|told myself|shouldnt have|shouldn't|no trade day|shouldn't|didn't want|didnt want/i.test(t.notes||""));
          if (forcedLosses.length >= 1) lossInsights.push(`<strong>${forcedLosses.length}</strong> loss${forcedLosses.length>1?"es":""} where you noted you <strong>shouldn't have taken the trade</strong>. Your gut was right — trust it next time.`);

          // Winning day chasing
          const winDayLosses = losses.filter(t => /winning day|win today|hoping|emotions|emotional|wanted.*win/i.test(t.notes||""));
          if (winDayLosses.length >= 1) lossInsights.push(`<strong>${winDayLosses.length}</strong> loss${winDayLosses.length>1?"es":""} tied to <strong>chasing a winning day</strong> or emotional motivation. These are your most avoidable losses.`);

          // News/FOMC
          const newsLosses = losses.filter(t => /fomc|news|overnight|trump|fed|report|geopolit/i.test(t.notes||""));
          if (newsLosses.length >= 1) lossInsights.push(`<strong>${newsLosses.length}</strong> loss${newsLosses.length>1?"es":""} on <strong>high-impact news days</strong>. Consider a strict no-trade rule on FOMC/major news.`);

          // NY Open unswept
          const nyLosses = losses.filter(t => /ny open|nyopen|new york open/i.test(t.notes||""));
          if (nyLosses.length >= 1) lossInsights.push(`<strong>${nyLosses.length}</strong> loss${nyLosses.length>1?"es":""} where <strong>NY Open hadn't been swept</strong>. That level kept stopping you — make it a filter.`);

          // Wrong draw/targets
          const drawLosses = losses.filter(t => /draw.*wrong|wrong.*draw|wrong.*target|target.*wrong|delivers|delivery/i.test(t.notes||""));
          if (drawLosses.length >= 1) lossInsights.push(`<strong>${drawLosses.length}</strong> loss${drawLosses.length>1?"es":""} from <strong>wrong draws on liquidity</strong>. Good execution, wrong target — a refinement issue not a discipline issue.`);

          // Scared / low confidence
          const scaredLosses = losses.filter(t => /scared|fear|nervous|not confident|wasn't confident|wasnt confident|size down/i.test(t.notes||""));
          if (scaredLosses.length >= 1) lossInsights.push(`<strong>${scaredLosses.length}</strong> loss${scaredLosses.length>1?"es":""} where you noted <strong>low confidence or fear</strong>. If you're sizing down because you're unsure, that's a signal to skip the trade entirely.`);

          // Shorts into strength
          const counterLosses = losses.filter(t => /wanted short|shorts.*higher|counter|against.*trend|fighting/i.test(t.notes||""));
          if (counterLosses.length >= 1) lossInsights.push(`<strong>${counterLosses.length}</strong> loss${counterLosses.length>1?"es":""} from <strong>fighting the trend</strong> — wanting shorts while price pushed higher. Wait for delivery, don't predict reversals.`);

          // Low confidence losses
          const lowConfLoss = losses.filter(t => t.confidence && t.confidence <= 4);
          if (lowConfLoss.length >= 1) lossInsights.push(`<strong>${lowConfLoss.length}</strong> loss${lowConfLoss.length>1?"es":""} entered with <strong>confidence ≤ 4/10</strong>. You knew the trade felt weak — that feeling is data. Use it as a hard filter.`);

          // Medium confidence losses (5-6)
          const midConfLoss = losses.filter(t => t.confidence && t.confidence >= 5 && t.confidence <= 6);
          if (midConfLoss.length >= 2) lossInsights.push(`<strong>${midConfLoss.length}</strong> loss${midConfLoss.length>1?"es":""} at <strong>confidence 5–6/10</strong>. Mediocre conviction = mediocre results. Raise your minimum confidence threshold.`);

          // Low grade losses (B, B-, C)
          const lowGradeLoss = losses.filter(t => t.grade && ["B","B-","C"].includes(t.grade));
          if (lowGradeLoss.length >= 1) lossInsights.push(`<strong>${lowGradeLoss.length}</strong> loss${lowGradeLoss.length>1?"es":""} on <strong>B/C grade setups</strong>. Missing sweep, IFVG, or valid entry — below your minimum standard.`);

          // No BSL/SSL sweep (rule #1 violation)
          const noSweepL = losses.filter(t => t.checklist && !t.checklist.sweep);
          if (noSweepL.length >= 1) lossInsights.push(`<strong>${noSweepL.length}</strong> loss${noSweepL.length>1?"es":""} taken <strong>without a liquidity sweep</strong>. Rule #1: BSL or SSL must be taken before entry. These were completely avoidable.`);

          // Invalid entry (took when internal high/low already hit)
          const invalidL = losses.filter(t => t.checklist && t.checklist.sweep && !t.checklist.valid);
          if (invalidL.length >= 1) lossInsights.push(`<strong>${invalidL.length}</strong> loss${invalidL.length>1?"es":""} on <strong>invalid entries</strong> — inversion co-occurred with or after the internal high/low. Wait for inversion to happen first.`);

          if (lossInsights.length === 0) lossInsights.push("Not enough note detail yet to detect specific loss patterns. Keep journaling.");

          return lossInsights.map(t => `<div class="insight" style="border-left-color:#e53935;">⚠️ ${t}</div>`).join("");
        })()}
      </div>

      <!-- Win patterns -->
      <div class="pattern-col">
        <div class="pattern-col-title" style="color:#4caf50;">Win Patterns</div>
        ${(() => {
          if (wins.length === 0) return `<div class="insight" style="border-left-color:#555;color:#aaa;">No wins logged yet.</div>`;
          const winInsights = [];

          // Calm/relaxed mindset wins
          const calmWins = wins.filter(t => /calm|relaxed|chilling|chill|patient|waited|confident|good mindset|right place/i.test(t.notes||""));
          if (calmWins.length >= 1) winInsights.push(`<strong>${calmWins.length}</strong> win${calmWins.length>1?"s":""} where you noted being <strong>calm or in the right headspace</strong>. Your best trades come when you're relaxed.`);

          // Followed rules
          const ruleWins = wins.filter(t => /followed.*rules|rules.*followed|waited.*setup|best setup|my rules/i.test(t.notes||""));
          if (ruleWins.length >= 1) winInsights.push(`<strong>${ruleWins.length}</strong> win${ruleWins.length>1?"s":""} where you explicitly <strong>followed your rules</strong> and waited for the best setup.`);

          // Strong confluence
          const confWins = wins.filter(t => /confluence|liquidity|sweep|momentum|strong|setup|signal/i.test(t.notes||""));
          if (confWins.length >= 1) winInsights.push(`<strong>${confWins.length}</strong> win${confWins.length>1?"s":""} with notes mentioning <strong>strong confluence or clear setups</strong> — these are your A+ trades.`);

          // High confidence wins
          const highConfWins = wins.filter(t => (t.confidence || 0) >= 8);
          if (highConfWins.length >= 1) winInsights.push(`<strong>${highConfWins.length}</strong> win${highConfWins.length>1?"s":""} logged with <strong>confidence 8+/10</strong>. High conviction trades are performing.`);

          // Average confidence on wins
          const confWinSet = wins.filter(t => t.confidence);
          if (confWinSet.length >= 2) {
            const avgCW = (confWinSet.reduce((a,t)=>a+t.confidence,0)/confWinSet.length).toFixed(1);
            winInsights.push(`Average confidence on your wins: <strong>${avgCW}/10</strong>. Trades above this mark tend to pay — below it, think twice.`);
          }

          // High grade wins (A, A+)
          const highGradeWins = wins.filter(t => t.grade && (t.grade === "A+" || t.grade === "A"));
          if (highGradeWins.length >= 1) winInsights.push(`<strong>${highGradeWins.length}</strong> win${highGradeWins.length>1?"s":""} on <strong>A/A+ grade setups</strong> — full checklist met. This is the blueprint.`);

          // Most common winning grade
          const gradeWinCount = {};
          wins.filter(t=>t.grade).forEach(t => { gradeWinCount[t.grade] = (gradeWinCount[t.grade]||0)+1; });
          const bestGrade = Object.entries(gradeWinCount).sort((a,b)=>b[1]-a[1])[0];
          if (bestGrade && bestGrade[1] >= 2) winInsights.push(`Your most common winning grade is <strong>${bestGrade[0]}</strong> (${bestGrade[1]} wins). Focus your entries here.`);

          if (winInsights.length === 0) winInsights.push("Keep adding detailed notes to your wins — patterns will surface here as you journal more.");

          return winInsights.map(t => `<div class="insight" style="border-left-color:#4caf50;">✅ ${t}</div>`).join("");
        })()}
      </div>
    </div>

    <hr class="divider">

    <!-- Tabbed journals -->
    <div class="section-title" style="margin-top:0;">Journals</div>
    <div class="journal-tabs">
      <button class="jtab active" onclick="filterJournals('all',this)">All</button>
      <button class="jtab" onclick="filterJournals('win',this)">Wins</button>
      <button class="jtab" onclick="filterJournals('loss',this)">Losses</button>
      <button class="jtab" onclick="filterJournals('be',this)">BE</button>
    </div>
    <div class="trade-list" id="journal-list"></div>
  `;

  // ── Grade helpers (mirrored from journal) ──
  function calcGrade(c) {
    const { sweep, ifvg, valid, target, pd, momentum } = c;
    if (sweep && ifvg && momentum && valid && target && pd) return "A+";
    if (sweep && ifvg && valid && target && pd)             return "A";
    if (sweep && ifvg && valid && target)                   return "A-";
    if (sweep && ifvg && target)                            return "B+";
    if (sweep && target)                                    return "B";
    if (sweep)                                              return "B-";
    return "C";
  }
  function gradeColor(g) {
    if (g === "A+") return "#4caf50";
    if (g === "A")  return "#66bb6a";
    if (g === "A-") return "#8bc34a";
    if (g === "B+") return "#ffa726";
    if (g === "B")  return "#ff7043";
    if (g === "B-") return "#e53935";
    return "#b71c1c";
  }

  // ── Journal card renderer ──
  function buildJournalCards(filter) {
    const list = document.getElementById("journal-list");
    if (!list) return;
    const filtered = filter === "all" ? trades : trades.filter(t => t.result.toLowerCase() === filter);
    if (filtered.length === 0) {
      list.innerHTML = `<p style="color:#aaa;font-size:14px;text-align:center;">No ${filter === "all" ? "" : filter} trades yet.</p>`;
      return;
    }
    const resultColor = { Win: "#4caf50", Loss: "#e53935", BE: "#42a5f5" };
    const borderClass  = { Win: "win-trade", Loss: "loss-trade", BE: "be-trade" };
    const clKeys   = ["sweep","ifvg","valid","target","pd","momentum"];
    const clLabels = ["BSL/SSL Swept","IFVG","Valid Entry","Clear DOL","Correct P/D","No Chop"];
    list.innerHTML = [...filtered].reverse().map(t => {
      const color = resultColor[t.result] || "white";
      const cls   = borderClass[t.result] || "";
      const imgHTML = t.image ? `<img src="${t.image}" alt="chart" onclick="openLightbox('${t.image.replace(/'/g,"\\'")}')">` : "";
      const conf = t.confidence;
      const confColor = conf >= 8 ? "#4caf50" : conf >= 5 ? "#ffa726" : conf ? "#e53935" : "#555";
      const confLabel = conf ? `${conf}/10` : "—/10";
      const qs = qualityScore(t);
      const qsHTML = qs !== null
        ? ` &nbsp;|&nbsp; QS: <span style="color:${qsColor(qs)};font-weight:bold;">${qs}/10</span>`
        : "";
      const gradeHTML = t.grade
        ? `<span style="color:${gradeColor(t.grade)};font-weight:bold;font-size:12px;background:#1a0a0c;padding:1px 7px;border-radius:4px;margin-left:6px;">${t.grade}</span>`
        : "";
      const typeHTML = t.tradeType
        ? `<span style="font-size:10px;color:#888;margin-left:6px;">${t.tradeType}</span>`
        : "";
      const checklistHTML = t.checklist
        ? `<div style="margin-top:7px;display:flex;flex-wrap:wrap;gap:4px;">` +
          clKeys.map((k,i) =>
            `<span style="font-size:10px;padding:2px 7px;border-radius:10px;background:${t.checklist[k]?"#1b4d1e":"#2b1015"};color:${t.checklist[k]?"#81c784":"#555"};">${t.checklist[k]?"✓":"✗"} ${clLabels[i]}</span>`
          ).join("") + `</div>`
        : "";
      const idx = trades.indexOf(t);
      return `
        <div class="trade ${cls}" onclick="openDetailPanel(${idx})">
          <div class="trade-date">${t.datetime || "No date"}</div>
          <strong>${t.pair}</strong> - <span style="color:${color};font-weight:bold;">${t.result}</span>${gradeHTML}${typeHTML}<br>
          RR: ${t.rr || "—"} &nbsp;|&nbsp; Confidence: <span style="color:${confColor};font-weight:bold;">${confLabel}</span>${qsHTML}
          ${checklistHTML}
          <div style="margin-top:8px;">${t.notes || ""}</div>
          ${imgHTML}
        </div>`;
    }).join("");
  }

  buildJournalCards("all");

  window.filterJournals = function(type, btn) {
    document.querySelectorAll(".jtab").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    buildJournalCards(type);
  };

  // ── Trade detail panel ──
  function openDetailPanel(index) {
    const t = trades[index];
    if (!t) return;

    const resultColor = { Win: "#4caf50", Loss: "#e53935", BE: "#42a5f5" };
    const color = resultColor[t.result] || "white";
    const conf = t.confidence;
    const confColor = conf >= 8 ? "#4caf50" : conf >= 5 ? "#ffa726" : conf ? "#e53935" : "#555";
    const clChecked = t.checklist ? ["sweep","ifvg","valid","target","pd","momentum"].filter(k => t.checklist[k]).length : null;
    const qs = (clChecked !== null || t.confidence)
      ? Math.round(((clChecked || 0) / 6) * 6 + ((t.confidence || 0) / 10) * 4)
      : null;
    const qsCol = qs !== null ? (qs >= 8 ? "#4caf50" : qs >= 5 ? "#ffa726" : "#e53935") : "#555";
    const clKeys   = ["sweep","ifvg","valid","target","pd","momentum"];
    const clLabels = ["BSL/SSL Swept","IFVG","Valid Entry","Clear DOL","Correct P/D","No Chop"];

    document.getElementById("detail-title").innerHTML =
      `<strong>${t.pair}</strong> &nbsp;<span style="color:${color}">${t.result}</span>` +
      (t.grade ? ` &nbsp;<span style="color:${gradeColor(t.grade)};font-size:14px;background:#2b0f14;padding:2px 9px;border-radius:5px;">${t.grade}</span>` : "");
    document.getElementById("detail-subtitle").textContent =
      (t.datetime || "") + (t.tradeType ? " · " + t.tradeType : "");

    const clHTML = t.checklist
      ? `<div class="detail-section-title">Checklist</div>
         <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px;">` +
        clKeys.map((k,i) =>
          `<span style="font-size:11px;padding:3px 10px;border-radius:10px;background:${t.checklist[k]?"#1b4d1e":"#2b1015"};color:${t.checklist[k]?"#81c784":"#666"};">${t.checklist[k]?"✓":"✗"} ${clLabels[i]}</span>`
        ).join("") + `</div>`
      : "";

    const formatNotes = (raw) => {
      const labels = ["Aligned with analysis","Rules followed","Mindset","Feeling","Would take again"];
      return raw.split("\n").map(line => {
        for (const lbl of labels) {
          if (line.startsWith(lbl + ": ")) {
            const val = line.slice(lbl.length + 2);
            return `<div style="margin-bottom:10px;"><span style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#aaa;font-weight:bold;">${lbl}</span><br><span style="font-size:14px;color:#ddd;">${val}</span></div>`;
          }
        }
        return `<span style="font-size:14px;color:#ddd;">${line}</span>`;
      }).join("");
    };

    const notesHTML = t.notes
      ? `<div class="detail-section-title">Notes</div>
         <div class="detail-notes">${formatNotes(t.notes)}</div>`
      : "";

    const imgHTML = t.image
      ? `<img class="detail-img" src="${t.image}" alt="chart" onclick="openLightbox('${t.image.replace(/'/g,"\\'")}')">`
      : "";

    document.getElementById("detail-body").innerHTML = `
      <div class="detail-row">
        <div class="detail-stat">
          <div class="detail-stat-label">RR</div>
          <div class="detail-stat-value">${t.rr || "—"}</div>
        </div>
        <div class="detail-stat">
          <div class="detail-stat-label">Confidence</div>
          <div class="detail-stat-value" style="color:${confColor}">${conf ? conf + "/10" : "—"}</div>
        </div>
        <div class="detail-stat">
          <div class="detail-stat-label">Quality Score</div>
          <div class="detail-stat-value" style="color:${qsCol}">${qs !== null ? qs + "/10" : "—"}</div>
        </div>
      </div>
      ${clHTML}
      ${notesHTML}
      ${imgHTML}
    `;

    document.getElementById("detail-panel").classList.add("open");
    document.getElementById("detail-overlay").classList.add("open");
  }

  function closeDetailPanel() {
    document.getElementById("detail-panel").classList.remove("open");
    document.getElementById("detail-overlay").classList.remove("open");
  }
}
</script>


</body>
</html>
