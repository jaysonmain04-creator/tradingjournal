<!DOCTYPE html>
<html>
<head>
  <title>Replay — Trade Analysis</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial;
      background-color: #401d23;
      color: white;
      min-height: 100vh;
    }

    nav {
      background: #2b0f14;
      padding: 12px 0;
      text-align: center;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 20px;
      font-weight: bold;
      font-size: 14px;
    }

    h1 {
      text-align: center;
      margin: 28px 0 8px;
      font-size: 36px;
    }

    .page-sub {
      text-align: center;
      color: #888;
      font-size: 13px;
      margin-bottom: 20px;
    }

    /* ── Trade selector row ── */
    #selector-wrap {
      padding: 0 16px 16px;
      max-width: 1400px;
      margin: 0 auto;
    }

    #selector-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    #trade-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    @media (max-width: 1100px) { #trade-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 760px)  { #trade-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px)  { #trade-grid { grid-template-columns: 1fr; } }

    .trade-card {
      background: #2b0f14;
      border-radius: 8px;
      padding: 10px 13px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.15s, border-color 0.15s;
      height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      position: relative;
    }

    .trade-card:hover { background: #351319; }
    .trade-card.selected { background: #3d1520; outline: 2px solid #8b3a44; }
    .trade-card.win-card  { border-left-color: #4caf50; }
    .trade-card.loss-card { border-left-color: #e53935; }
    .trade-card.be-card   { border-left-color: #42a5f5; }

    .tc-date { font-size: 10px; color: #888; }
    .tc-pair { font-size: 16px; font-weight: bold; }
    .tc-result { font-weight: bold; font-size: 13px; }
    .tc-meta { font-size: 11px; color: #aaa; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .tc-grade { font-size: 11px; font-weight: bold; background: #1a0a0c; padding: 1px 7px; border-radius: 4px; }
    .tc-conf { font-size: 11px; }

    .no-trades-msg {
      text-align: center;
      color: #888;
      padding: 40px 16px;
      font-size: 14px;
    }

    /* ── Divider ── */
    .divider {
      max-width: 1400px;
      margin: 4px auto 20px;
      padding: 0 16px;
      border: none;
      border-top: 1px solid #3a1018;
    }

    /* ── Analysis panel ── */
    #analysis-wrap {
      max-width: 900px;
      margin: 0 auto 60px;
      padding: 0 16px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #555;
      font-size: 16px;
    }

    .empty-state .empty-icon {
      font-size: 48px;
      display: block;
      margin-bottom: 14px;
      opacity: 0.4;
    }

    /* ── Header strip ── */
    .analysis-header {
      background: #2b0f14;
      border-radius: 10px;
      padding: 18px 22px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .ah-pair { font-size: 26px; font-weight: bold; }
    .ah-result { font-size: 18px; font-weight: bold; }
    .ah-grade {
      font-size: 14px;
      font-weight: bold;
      padding: 3px 12px;
      border-radius: 6px;
      background: #1a0a0c;
    }
    .ah-type { font-size: 13px; color: #aaa; background: #1a0a0c; padding: 3px 10px; border-radius: 5px; }
    .ah-date { font-size: 12px; color: #888; margin-left: auto; }

    /* ── Stats row ── */
    .stats-row {
      display: flex;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: #2b0f14;
      border-radius: 8px;
      padding: 14px 18px;
      flex: 1;
      min-width: 100px;
      text-align: left;
    }

    .stat-label {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: bold;
    }

    /* ── Section containers ── */
    .section-card {
      background: #2b0f14;
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      font-weight: bold;
    }

    /* ── AI Analysis card ── */
    .ai-card {
      border-radius: 6px;
      padding: 12px 14px;
      border-left: 3px solid;
      font-size: 14px;
      line-height: 1.5;
    }

    .ai-severity-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      display: block;
      margin-bottom: 4px;
    }

    /* ── Checklist ── */
    .checklist-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    @media (max-width: 560px) { .checklist-grid { grid-template-columns: repeat(2, 1fr); } }

    .cl-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 6px;
    }

    .cl-item.pass { background: #1b4d1e; color: #81c784; }
    .cl-item.fail { background: #2b1015; color: #555; }

    .cl-icon { font-size: 14px; font-weight: bold; flex-shrink: 0; }

    /* ── Mistake badges ── */
    .mistakes-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .mistake-badge {
      background: #3a0e10;
      border-left: 3px solid #e53935;
      border-radius: 5px;
      padding: 9px 14px;
      font-size: 13px;
      color: #f28b82;
      line-height: 1.4;
    }

    .no-violations {
      background: #1b3a1e;
      border-left: 3px solid #4caf50;
      border-radius: 5px;
      padding: 10px 14px;
      font-size: 13px;
      color: #81c784;
    }

    /* ── Chart image ── */
    .chart-img {
      width: 100%;
      border-radius: 8px;
      display: block;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .chart-img:hover { opacity: 0.9; }

    /* ── Notes ── */
    .notes-content {
      font-size: 14px;
      color: #ddd;
      line-height: 1.7;
      white-space: pre-line;
    }

    .note-line-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #aaa;
      font-weight: bold;
      display: block;
      margin-bottom: 2px;
    }

    .note-line-val {
      font-size: 14px;
      color: #ddd;
      display: block;
      margin-bottom: 10px;
    }

    /* ── Pattern context ── */
    .pattern-lines {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .pattern-line {
      background: #1a0a0c;
      border-radius: 6px;
      padding: 9px 14px;
      font-size: 13px;
      color: #bbb;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .pattern-val { font-weight: bold; color: white; }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 9999;
      justify-content: center;
      align-items: center;
    }

    #lightbox.open { display: flex; }

    #lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      border-radius: 8px;
      display: block;
    }

    #lightbox-close {
      position: fixed;
      top: 16px;
      right: 20px;
      font-size: 30px;
      cursor: pointer;
      color: white;
      font-weight: bold;
      background: none;
      border: none;
      padding: 0;
      line-height: 1;
      z-index: 10000;
    }
  </style>
</head>

<h1>Replay</h1>
<p class="page-sub">Select a trade to analyze it in detail</p>

<!-- Trade selector -->
<div id="selector-wrap">
  <div id="selector-label">Select a trade</div>
  <div id="trade-grid"></div>
</div>

<hr class="divider">

<!-- Analysis panel -->
<div id="analysis-wrap">
  <div id="analysis-panel">
    <div class="empty-state">
      <span class="empty-icon">&#x1F4CA;</span>
      Select a trade above to analyze it
    </div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox" onclick="if(event.target===this)closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()">&#x2715;</button>
  <img id="lightbox-img" src="" alt="chart">
</div>

<script>
// ════════════════════════════════════════════════════════════════
//  Utility helpers
// ════════════════════════════════════════════════════════════════

function parseRR(rr) {
  if (rr === null || rr === undefined) return null;
  const s = String(rr).trim();
  if (!s) return null;
  const ci = s.indexOf(":");
  if (ci !== -1) {
    const risk   = parseFloat(s.slice(0, ci));
    const reward = parseFloat(s.slice(ci + 1));
    if (isNaN(risk) || isNaN(reward) || risk === 0) return null;
    return reward / risk;
  }
  const v = parseFloat(s);
  return isNaN(v) ? null : v;
}

function gradeColor(g) {
  if (g === "A+") return "#4caf50";
  if (g === "A")  return "#66bb6a";
  if (g === "A-") return "#8bc34a";
  if (g === "B+") return "#ffa726";
  if (g === "B")  return "#ff7043";
  if (g === "B-") return "#e53935";
  return "#b71c1c";
}

function resultColor(r) {
  return r === "Win" ? "#4caf50" : r === "Loss" ? "#e53935" : "#42a5f5";
}

function confColor(c) {
  if (!c) return "#555";
  return c >= 8 ? "#4caf50" : c >= 5 ? "#ffa726" : "#e53935";
}

// ════════════════════════════════════════════════════════════════
//  Quality Score
// ════════════════════════════════════════════════════════════════
function qualityScore(t) {
  let score = 0, has = false;
  if (t.checklist) {
    score += (["sweep","ifvg","valid","target","pd","momentum"].filter(k => t.checklist[k]).length / 6) * 6;
    has = true;
  }
  if (t.confidence) { score += (t.confidence / 10) * 4; has = true; }
  return has ? Math.round(score) : null;
}

// ════════════════════════════════════════════════════════════════
//  AI Analyzer (from analysis.html Feature 2)
// ════════════════════════════════════════════════════════════════
function analyzeTrade(trade) {
  if (trade == null) return { message: "No trade data provided.", severity: "info" };
  const { checklist, confidence, grade, result } = trade;

  if (checklist != null && checklist.sweep === false)
    return { message: "Trade taken without liquidity sweep — Rule #1 violated.", severity: "warning" };

  if (confidence != null && confidence <= 4)
    return { message: "Low confidence trade detected (\u22644/10) — high risk entry.", severity: "warning" };

  if (grade != null && (grade === "B" || grade === "B-" || grade === "C"))
    return { message: `Low-quality setup (Grade ${grade}) — below minimum standard.`, severity: "warning" };

  if (result === "Loss" && checklist != null && checklist.valid === false)
    return { message: "Invalid entry detected — entry was not valid (inversion not confirmed).", severity: "warning" };

  const full = checklist != null && checklist.sweep && checklist.ifvg && checklist.valid &&
               checklist.target && checklist.pd && checklist.momentum;
  if (full && (confidence == null || confidence >= 8) && (grade == null || grade === "A+" || grade === "A"))
    return { message: "A+ execution — full checklist, high conviction, clean setup.", severity: "good" };

  return { message: "Valid trade execution.", severity: "info" };
}

function renderTradeAnalysis(trade) {
  const { message, severity } = analyzeTrade(trade);
  const S = {
    warning: { border: "#ffa726", text: "#e53935", label: "Warning" },
    good:    { border: "#4caf50", text: "#4caf50", label: "Good"    },
    info:    { border: "#42a5f5", text: "#42a5f5", label: "Info"    }
  };
  const { border, text, label } = S[severity] || S.info;
  return `
    <div class="ai-card" style="background:#1a0a0c;border-color:${border};">
      <span class="ai-severity-label" style="color:${border};">${label}</span>
      <span style="color:${text};">${message}</span>
    </div>`;
}

// ════════════════════════════════════════════════════════════════
//  Mistake Detection
// ════════════════════════════════════════════════════════════════
function detectMistakes(t) {
  const mistakes = [];
  const cl = t.checklist || {};

  if (cl.sweep === false)
    mistakes.push("Entered without BSL/SSL sweep — Rule #1 violated");

  if (cl.ifvg === false)
    mistakes.push("IFVG not identified before entry");

  if (cl.valid === false)
    mistakes.push("Entry invalid — internal high/low already taken");

  if (t.confidence != null && t.confidence <= 4)
    mistakes.push(`Low confidence (${t.confidence}/10) — high risk entry`);

  if (t.grade && (t.grade === "B-" || t.grade === "C"))
    mistakes.push(`Below minimum grade (Grade ${t.grade})`);

  const notes = (t.notes || "").toLowerCase();
  if (/forced|fomo|revenge|chasing|emotional/.test(notes))
    mistakes.push("Emotional/forced trade detected");

  if (/fomc|trump|news|fed/.test(notes))
    mistakes.push("High-impact news day trade");

  return mistakes;
}

// ════════════════════════════════════════════════════════════════
//  Format notes (recognise structured keys from journal)
// ════════════════════════════════════════════════════════════════
function formatNotes(raw) {
  if (!raw || !raw.trim()) return "";
  const labelMap = [
    { key: "Why I entered",         display: "Why did you enter this trade?" },
    { key: "Aligned with analysis", display: "Was the trade aligned with analysis?" },
    { key: "Rules followed",        display: "Were your rules followed?" },
    { key: "Mindset",               display: "What was your mindset?" },
    { key: "Feeling",               display: "How did you feel?" },
    { key: "Would take again",      display: "Would you take it again?" },
  ];
  return raw.split("\n").map(line => {
    for (const { key, display } of labelMap) {
      if (line.startsWith(key + ": ")) {
        const val = line.slice(key.length + 2);
        return `<span class="note-line-label">${display}</span><span class="note-line-val">${val}</span>`;
      }
    }
    return `<span class="note-line-val">${line}</span>`;
  }).join("");
}

// ════════════════════════════════════════════════════════════════
//  Pattern Context
// ════════════════════════════════════════════════════════════════
function buildPatternContext(trade, allTrades) {
  const lines = [];

  // Pair context
  if (trade.pair) {
    const pairTrades = allTrades.filter(t => t.pair === trade.pair);
    const pairWins   = pairTrades.filter(t => t.result === "Win").length;
    const pairLosses = pairTrades.filter(t => t.result === "Loss").length;
    const wlDenom    = pairWins + pairLosses;
    const pairWR     = wlDenom > 0 ? Math.round((pairWins / wlDenom) * 100) : null;
    const wrStr      = pairWR !== null ? `${pairWR}% win rate` : "no W/L data";
    lines.push({ label: `${trade.pair} — ${pairTrades.length} total trades`, value: wrStr });
  }

  // Confidence context
  if (trade.confidence != null) {
    const confTrades = allTrades.filter(t => t.confidence === trade.confidence);
    lines.push({ label: `Confidence ${trade.confidence}/10`, value: `${confTrades.length} trades at this level` });
  }

  // Grade context
  if (trade.grade) {
    const gradeTrades = allTrades.filter(t => t.grade === trade.grade);
    const gradeWins   = gradeTrades.filter(t => t.result === "Win").length;
    const gradeLosses = gradeTrades.filter(t => t.result === "Loss").length;
    const gwDenom     = gradeWins + gradeLosses;
    const gradeWR     = gwDenom > 0 ? Math.round((gradeWins / gwDenom) * 100) + "% WR" : "no W/L data";
    lines.push({ label: `Grade ${trade.grade} — ${gradeTrades.length} trades`, value: gradeWR });
  }

  return lines;
}

// ════════════════════════════════════════════════════════════════
//  Render full analysis panel
// ════════════════════════════════════════════════════════════════
function renderAnalysis(trade, allTrades) {
  const rColor = resultColor(trade.result);
  const cConf  = confColor(trade.confidence);
  const qs     = qualityScore(trade);
  const qsCol  = qs !== null ? (qs >= 8 ? "#4caf50" : qs >= 5 ? "#ffa726" : "#e53935") : "#555";

  const clKeys   = ["sweep","ifvg","valid","target","pd","momentum"];
  const clLabels = ["BSL/SSL Swept","IFVG Identified","Valid Entry","Clear DOL","Correct P/D","No Chop"];

  // ── 1. Header ──
  const headerHTML = `
    <div class="analysis-header">
      <span class="ah-pair">${trade.pair || "—"}</span>
      <span class="ah-result" style="color:${rColor};">${trade.result || "—"}</span>
      ${trade.grade
        ? `<span class="ah-grade" style="color:${gradeColor(trade.grade)};">${trade.grade}</span>`
        : ""}
      ${trade.tradeType
        ? `<span class="ah-type">${trade.tradeType}</span>`
        : ""}
      <span class="ah-date">${trade.datetime || ""}</span>
    </div>`;

  // ── 2. Stats row ──
  const statsHTML = `
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">RR</div>
        <div class="stat-value">${trade.rr || "—"}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Confidence</div>
        <div class="stat-value" style="color:${cConf};">${trade.confidence != null ? trade.confidence + "/10" : "—"}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Quality Score</div>
        <div class="stat-value" style="color:${qsCol};">${qs !== null ? qs + "/10" : "—"}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Grade</div>
        <div class="stat-value" style="color:${trade.grade ? gradeColor(trade.grade) : "#555"};">${trade.grade || "—"}</div>
      </div>
    </div>`;

  // ── 3. AI Analysis ──
  const aiHTML = `
    <div class="section-card">
      <div class="section-title">AI Analysis</div>
      ${renderTradeAnalysis(trade)}
    </div>`;

  // ── 4. Checklist breakdown ──
  const hasCL = !!trade.checklist;
  const checklistItemsHTML = hasCL
    ? clKeys.map((k, i) => {
        const pass = !!trade.checklist[k];
        return `<div class="cl-item ${pass ? "pass" : "fail"}">
          <span class="cl-icon">${pass ? "✓" : "✗"}</span>
          <span>${clLabels[i]}</span>
        </div>`;
      }).join("")
    : `<span style="color:#666;font-size:13px;">No checklist data recorded for this trade.</span>`;

  const checklistHTML = `
    <div class="section-card">
      <div class="section-title">Checklist Breakdown</div>
      <div class="checklist-grid">${checklistItemsHTML}</div>
    </div>`;

  // ── 5. Mistake Detection ──
  const mistakes = detectMistakes(trade);
  const mistakesHTML = `
    <div class="section-card">
      <div class="section-title">Mistake Detection</div>
      <div class="mistakes-list">
        ${mistakes.length === 0
          ? `<div class="no-violations">No violations detected — clean execution.</div>`
          : mistakes.map(m => `<div class="mistake-badge">${m}</div>`).join("")
        }
      </div>
    </div>`;

  // ── 6. Chart Image ──
  const imageHTML = trade.image
    ? `<div class="section-card">
        <div class="section-title">Chart</div>
        <img class="chart-img" src="${trade.image}" alt="chart" onclick="openLightbox('${trade.image}')">
      </div>`
    : "";

  // ── 7. Trade Notes ──
  const notesHTML = trade.notes && trade.notes.trim()
    ? `<div class="section-card">
        <div class="section-title">Trade Notes</div>
        <div class="notes-content">${formatNotes(trade.notes)}</div>
      </div>`
    : "";

  // ── 8. Pattern Context ──
  const contextLines = buildPatternContext(trade, allTrades);
  const contextHTML = contextLines.length > 0
    ? `<div class="section-card">
        <div class="section-title">Pattern Context</div>
        <div class="pattern-lines">
          ${contextLines.map(l => `
            <div class="pattern-line">
              <span>${l.label}</span>
              <span class="pattern-val">${l.value}</span>
            </div>`).join("")}
        </div>
      </div>`
    : "";

  return headerHTML + statsHTML + aiHTML + checklistHTML + mistakesHTML + imageHTML + notesHTML + contextHTML;
}

// ════════════════════════════════════════════════════════════════
//  Trade selector cards
// ════════════════════════════════════════════════════════════════
let trades = [];
let selectedIndex = null;

function loadTrades() {
  try {
    trades = JSON.parse(localStorage.getItem("trades")) || [];
  } catch(e) {
    trades = [];
  }
}

function renderSelector() {
  const grid = document.getElementById("trade-grid");
  grid.innerHTML = "";

  if (trades.length === 0) {
    grid.innerHTML = `<div class="no-trades-msg" style="grid-column:1/-1;">No trades found. Add trades in the Journal first.</div>`;
    return;
  }

  // Show newest first
  [...trades].reverse().forEach((t, revIdx) => {
    const origIdx = trades.length - 1 - revIdx;
    const rColor  = resultColor(t.result);
    const cColor  = confColor(t.confidence);
    const colorClass = t.result === "Win" ? "win-card" : t.result === "Loss" ? "loss-card" : "be-card";

    const gradeSpan = t.grade
      ? `<span class="tc-grade" style="color:${gradeColor(t.grade)};">${t.grade}</span>`
      : "";
    const confSpan = t.confidence != null
      ? `<span class="tc-conf" style="color:${cColor};">${t.confidence}/10</span>`
      : "";

    const card = document.createElement("div");
    card.className = `trade-card ${colorClass}${selectedIndex === origIdx ? " selected" : ""}`;
    card.dataset.index = origIdx;
    card.innerHTML = `
      <div>
        <div class="tc-date">${t.datetime || "No date"}</div>
        <div style="display:flex;align-items:center;gap:7px;margin-top:3px;">
          <span class="tc-pair">${t.pair || "—"}</span>
          <span class="tc-result" style="color:${rColor};">${t.result || "—"}</span>
        </div>
      </div>
      <div class="tc-meta">
        ${gradeSpan}
        ${confSpan}
        ${t.rr ? `<span style="color:#888;">RR ${t.rr}</span>` : ""}
      </div>`;

    card.addEventListener("click", () => selectTrade(origIdx));
    grid.appendChild(card);
  });
}

function selectTrade(index) {
  selectedIndex = index;

  // Update card highlight
  document.querySelectorAll(".trade-card").forEach(c => {
    c.classList.toggle("selected", parseInt(c.dataset.index) === index);
  });

  const panel = document.getElementById("analysis-panel");
  const trade = trades[index];
  if (!trade) {
    panel.innerHTML = `<div class="empty-state"><span class="empty-icon">&#x26A0;</span>Trade not found.</div>`;
    return;
  }

  panel.innerHTML = renderAnalysis(trade, trades);
  panel.scrollIntoView({ behavior: "smooth", block: "start" });
}

// ════════════════════════════════════════════════════════════════
//  Lightbox
// ════════════════════════════════════════════════════════════════
function openLightbox(src) {
  document.getElementById("lightbox-img").src = src;
  document.getElementById("lightbox").classList.add("open");
}

function closeLightbox() {
  document.getElementById("lightbox").classList.remove("open");
  document.getElementById("lightbox-img").src = "";
}

document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") closeLightbox();
});

// ════════════════════════════════════════════════════════════════
//  Init
// ════════════════════════════════════════════════════════════════
loadTrades();
renderSelector();
</script>
