<!DOCTYPE html>
<html>
<head>
  <title>Trading Journal</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background-color: #401d23;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 40px;
      font-size: 40px;
    }

    .box {
      margin: 40px auto;
      padding: 20px;
      width: 300px;
      background: #5a2a31;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.6);
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: none;
      background: #2b0f14;
      color: white;
    }

    button {
      width: 95%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      border: none;
      background: #8b3a44;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #a44b55;
    }

    .trade {
      background: #2b0f14;
      margin: 10px auto;
      padding: 10px;
      width: 300px;
      border-radius: 8px;
      position: relative;
    }

    .delete-btn {
      position: absolute;
      top: 8px;
      right: 10px;
      width: auto;
      padding: 3px 8px;
      margin: 0;
      background: #6b1a22;
      font-size: 12px;
      border-radius: 4px;
    }

    .delete-btn:hover {
      background: #c0392b;
    }
  </style>
</head>
<body>

<h1>Trading Journal</h1>

<div class="box">
  <input id="pair" placeholder="Index">
  <input id="result" placeholder="Win / Loss">
  <input id="notes" placeholder="Notes">
  <button onclick="addTrade()">Add Trade</button>
</div>

<h3>Your Trades</h3>
<div id="trades"></div>

<script>
let trades = JSON.parse(localStorage.getItem("trades")) || [];

function renderTrades() {
  const container = document.getElementById("trades");
  container.innerHTML = "";

  trades.forEach((t, index) => {
    container.innerHTML += `
      <div class="trade">
        <button class="delete-btn" onclick="deleteTrade(${index})">✕</button>
        <strong>${t.pair}</strong> - ${t.result}<br>
        ${t.notes}
      </div>
    `;
  });
}

function addTrade() {
  const pair = document.getElementById("pair").value;
  const result = document.getElementById("result").value;
  const notes = document.getElementById("notes").value;

  if (!pair || !result) {
    alert("Fill in Pair and Result");
    return;
  }

  const trade = { pair, result, notes };
  trades.push(trade);

  localStorage.setItem("trades", JSON.stringify(trades));
  renderTrades();

  document.getElementById("pair").value = "";
  document.getElementById("result").value = "";
  document.getElementById("notes").value = "";
}

function deleteTrade(index) {
  trades.splice(index, 1);
  localStorage.setItem("trades", JSON.stringify(trades));
  renderTrades();
}

renderTrades();
</script>

</body>
</html>
