<!DOCTYPE html>
<html>
<head>
  <title>Trading Journal</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background-color: #401d23;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 40px;
      font-size: 40px;
    }

    .box {
      margin: 40px auto;
      padding: 20px;
      width: 320px;
      background: #5a2a31;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.6);
    }

    input, select {
      width: 95%;
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: none;
      background: #2b0f14;
      color: white;
    }

    button {
      width: 95%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      border: none;
      background: #8b3a44;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #a44b55;
    }

    .trade {
      background: #2b0f14;
      margin: 10px auto;
      padding: 10px;
      width: 320px;
      border-radius: 8px;
    }

    .delete-btn {
      background: red;
      margin-top: 5px;
    }
  </style>
</head>
<body>

<h1>Trading Journal</h1>

<div class="box">

  <!-- Pair Dropdown -->
  <select id="pair">
    <option value="">Select Pair</option>
    <option value="NQ">NQ</option>
    <option value="ES">ES</option>
    <option value="MNQ">MNQ</option>
  </select>

  <!-- Result Dropdown -->
  <select id="result">
    <option value="">Select Result</option>
    <option value="Win">Win</option>
    <option value="Loss">Loss</option>
    <option value="BE">BE</option>
  </select>

  <!-- RR Input -->
  <input id="rr" placeholder="RR">

  <!-- Notes -->
  <input id="notes" placeholder="Notes">

  <button onclick="addTrade()">Add Trade</button>
</div>

<h3>Your Trades</h3>
<div id="trades"></div>

<script>
let trades = JSON.parse(localStorage.getItem("trades")) || [];

function renderTrades() {
  const container = document.getElementById("trades");
  container.innerHTML = "";

  trades.forEach((t, index) => {
    container.innerHTML += `
      <div class="trade">
        <strong>${t.pair}</strong> - ${t.result}<br>
        RR: ${t.rr}<br>
        ${t.notes}
        <br>
        <button class="delete-btn" onclick="deleteTrade(${index})">Delete</button>
      </div>
    `;
  });
}

function addTrade() {
  const pair = document.getElementById("pair").value;
  const result = document.getElementById("result").value;
  const rr = document.getElementById("rr").value;
  const notes = document.getElementById("notes").value;

  if (!pair || !result) {
    alert("Select pair and result");
    return;
  }

  const trade = { pair, result, rr, notes };
  trades.push(trade);

  localStorage.setItem("trades", JSON.stringify(trades));
  renderTrades();

  // clear inputs
  document.getElementById("pair").value = "";
  document.getElementById("result").value = "";
  document.getElementById("rr").value = "";
  document.getElementById("notes").value = "";
}

function deleteTrade(index) {
  trades.splice(index, 1);
  localStorage.setItem("trades", JSON.stringify(trades));
  renderTrades();
}

renderTrades();
</script>

</body>
</html>
