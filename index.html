<!DOCTYPE html>
<html>
<head>
  <title>Trading Journal</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #401d23;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 40px;
      font-size: 40px;
    }

    .box {
      margin: 40px auto;
      padding: 20px;
      width: 300px;
      background: #5a2a31;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.6);
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: none;
      background: #2b0f14;
      color: white;
    }

    input::placeholder {
      color: #aaa;
    }

    button {
      width: 95%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      border: none;
      background: #8b3a44;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #a44b55;
    }
  </style>
</head>
<body>

<h1>Trading Journal</h1>

<div class="box">
  <input placeholder="Pair (NQ)">
  <input placeholder="Win / Loss">
  <input placeholder="Notes">
  <button>Add Trade</button>
</div>

</body>
</html>
